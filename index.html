<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GymBuddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #121212;
    --bg-surface: #1E1E1E;
    --bg-surface-raised: #262626;
    --accent-primary: #39FF14;
    --accent-primary-dim: #2BC010;
    --accent-warn: #FFBF00;
    --text-primary: #FFFFFF;
    --text-secondary: #9CA3AF;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --tap-target-min: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at 30% 20%, #1a1a1a 0%, #0d0d0d 55%, #050505 100%);
    color: var(--text-primary);
    min-height: 100vh; min-height: 100dvh;
    display: flex; justify-content: center; align-items: center;
    padding: 12px; -webkit-font-smoothing: antialiased;
  }
  .phone-frame {
    width: 100%; max-width: 420px; height: 100%; max-height: 800px; min-height: 560px;
    background: var(--bg-base); border-radius: 32px; border: 1px solid #2A2A2A;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .screen { display: none; flex-direction: column; padding: 20px 20px 16px; position: relative; overflow-y: auto; height: 100%; }
  .screen.active { display: flex; animation: screenIn 0.32s cubic-bezier(0.16,1,0.3,1); }
  @keyframes screenIn { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: translateX(0); } }

  h1 { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 800; line-height: 1.2; letter-spacing: -0.02em; }
  h2 { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .text-secondary { color: var(--text-secondary); font-size: 14px; line-height: 1.5; }
  .eyebrow { font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent-primary); text-transform: uppercase; margin-bottom: 10px; }

  .btn-primary {
    min-height: var(--tap-target-min); background: var(--accent-primary); color: #0A1A05; border: none;
    border-radius: var(--radius-md); font-family: 'Sora', sans-serif; font-weight: 700; font-size: 16px;
    letter-spacing: -0.01em; cursor: pointer; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 0 24px rgba(57,255,20,0.25); transition: transform 0.12s ease;
  }
  .btn-primary:active { background: var(--accent-primary-dim); transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.4; box-shadow: none; }

  .option-chip {
    min-height: var(--tap-target-min); background: var(--bg-surface); border: 2px solid #2E2E2E;
    border-radius: var(--radius-md); color: var(--text-primary); font-size: 16px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; padding: 0 18px;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.12s ease;
  }
  .option-chip:active { transform: scale(0.97); }
  .option-chip.selected {
    border-color: var(--accent-primary); background: rgba(57,255,20,0.08); color: var(--accent-primary);
    animation: chipPop 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes chipPop { 0% { transform: scale(1); } 40% { transform: scale(1.03); } 100% { transform: scale(1); } }
  .option-stack { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }

  .avatar-dock { display: flex; align-items: flex-end; gap: 10px; }
  .avatar-bubble {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(145deg, var(--accent-primary), #1FA80A);
    display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
    box-shadow: 0 0 20px rgba(57,255,20,0.4);
  }
  .avatar-speech {
    background: var(--bg-surface-raised); border: 1px solid #333; border-radius: var(--radius-md);
    border-bottom-left-radius: 4px; padding: 12px 14px; font-size: 14px; font-weight: 600; max-width: 260px;
  }

  .progress-dots { display: flex; gap: 6px; margin-bottom: 18px; }
  .progress-dots span { height: 4px; flex: 1; border-radius: 2px; background: #2A2A2A; }
  .progress-dots span.done { background: var(--accent-primary); }

  .progress-card { background: var(--bg-surface); border-radius: var(--radius-lg); padding: 20px; margin-top: 12px; }
  .progress-card-top { display: flex; justify-content: space-between; align-items: baseline; }
  .progress-card-title { font-size: 15px; font-weight: 700; }
  .progress-card-value { font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent-primary); }
  .progress-track { height: 10px; background: #2A2A2A; border-radius: 5px; overflow: hidden; margin-top: 12px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-primary-dim), var(--accent-primary)); border-radius: 5px; transition: width 0.3s ease; }
  .progress-card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 8px; }

  .day-card { border-left: 4px solid var(--accent-primary); background: var(--bg-surface); border-radius: 12px; padding: 16px; margin-top: 12px; }
  .day-title { font-family: 'Sora', sans-serif; font-weight: 700; color: var(--accent-primary); font-size: 16px; }
  .day-focus { font-size: 13px; color: var(--text-secondary); margin-top: 4px; margin-bottom: 10px; }

  .phase-label { font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; }

  .btn-timer-start { min-height: 32px; background: none; border: 1.5px solid var(--accent-primary); color: var(--accent-primary); border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; padding: 0 12px; flex-shrink: 0; white-space: nowrap; }
  .timer-display { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 800; color: var(--accent-primary); flex-shrink: 0; min-width: 46px; text-align: right; }
  .timer-done { font-size: 13px; font-weight: 700; color: var(--accent-primary); flex-shrink: 0; }

  .exercise-tap-area { flex: 1; min-width: 0; cursor: pointer; }
  .play-icon-btn {
    width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--accent-primary);
    background: rgba(57,255,20,0.08); color: var(--accent-primary); font-size: 13px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; padding: 0;
  }
  .play-icon-btn:disabled { opacity: 0.4; cursor: default; }
  .expand-caret { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; cursor: pointer; padding: 4px; }
  .coach-badge { display: inline-block; font-size: 11px; color: var(--text-secondary); background: var(--bg-surface-raised); padding: 4px 8px; border-radius: 6px; margin-top: 8px; opacity: 0.6; cursor: default; }
  .video-area { padding: 0 0 4px 32px; margin-top: 2px; }
  .video-embed { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-sm); margin-top: 6px; border: none; display: block; }
  .video-loading { font-size: 12px; color: var(--text-secondary); padding: 4px 0; }
  .video-error { font-size: 11px; color: #FF8080; margin-top: 6px; }

  .session-progress-label { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
  .session-item { background: var(--bg-surface); border-radius: 12px; padding: 12px 14px; margin-top: 10px; transition: opacity 0.2s ease; }
  .session-item-completed { opacity: 0.45; }
  .session-item-locked { opacity: 0.35; }
  .session-item-current { border: 1.5px solid var(--accent-primary); box-shadow: 0 0 16px rgba(57,255,20,0.15); }
  .session-item-row { display: flex; align-items: center; gap: 10px; }
  .session-item-badge { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
  .session-item-name { font-weight: 600; font-size: 14px; }
  .session-item-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .session-status-icon { font-size: 15px; flex-shrink: 0; color: var(--accent-primary); }
  .session-status-icon.locked { color: var(--text-secondary); }
  .session-item-instructions { font-size: 12px; color: var(--text-secondary); margin-top: 8px; line-height: 1.4; padding-left: 30px; }
  .session-item-alt { font-size: 12px; color: var(--accent-warn); margin-top: 6px; padding-left: 30px; }
  .session-item-controls { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding-left: 30px; }
  .btn-skip { min-height: 36px; background: none; border: 1.5px solid #444; color: var(--text-secondary); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; padding: 0 14px; }
  .btn-done { min-height: 36px; background: var(--accent-primary); color: #0A1A05; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; cursor: pointer; padding: 0 16px; }

  .summary-list { list-style: none; margin-top: 8px; }
  .summary-list li { font-size: 13px; color: var(--text-primary); background: var(--bg-surface); padding: 10px 12px; border-radius: 8px; margin-top: 6px; }

  .loading-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 14px; }
  .spinner { width: 36px; height: 36px; border: 3px solid #2A2A2A; border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(255,80,80,0.1); border: 1px solid #663333; color: #FF8080; padding: 12px; border-radius: 10px; font-size: 13px; margin-top: 10px; }

  .btn-ghost { min-height: 44px; background: none; border: none; color: var(--text-secondary); font-size: 13px; cursor: pointer; width: 100%; margin-top: 10px; }
</style>
</head>
<body>
<div class="phone-frame" id="phoneFrame"></div>

<script>
const STORAGE_KEYS = {
  name: 'gymbuddy_name',
  streak: 'gymbuddy_streak',
  lastActiveDay: 'gymbuddy_last_active_day',
  plan: 'gymbuddy_plan',
  onboarding: 'gymbuddy_onboarding',
  dayProgress: 'gymbuddy_day_progress',
  sequenceProgress: 'gymbuddy_sequence_progress',
};

const STATE = {
  screen: 'profile',
  name: localStorage.getItem(STORAGE_KEYS.name) || '',
  onboarding: JSON.parse(localStorage.getItem(STORAGE_KEYS.onboarding) || '{"experience_level":null,"days_available":null,"goal":null,"injuries":""}'),
  plan: JSON.parse(localStorage.getItem(STORAGE_KEYS.plan) || 'null'),
  dayProgress: JSON.parse(localStorage.getItem(STORAGE_KEYS.dayProgress) || '{}'),
  sequenceProgress: JSON.parse(localStorage.getItem(STORAGE_KEYS.sequenceProgress) || '{}'),
  streak: parseInt(localStorage.getItem(STORAGE_KEYS.streak) || '0', 10),
  loading: false,
  error: null,
  expanded: {},
  videoCache: {},
  videoLoading: {},
  videoError: {},
  timers: {},
};

function escapeHtml(value) {
  if (value === null || value === undefined) return '';
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function parseDurationToSeconds(duration) {
  if (!duration) return null;
  const str = String(duration).toLowerCase();
  let total = 0;
  let matched = false;
  const minMatch = str.match(/(\d+(?:\.\d+)?)\s*(?:min|minute)/);
  const secMatch = str.match(/(\d+(?:\.\d+)?)\s*(?:sec|second)/);
  if (minMatch) { total += parseFloat(minMatch[1]) * 60; matched = true; }
  if (secMatch) { total += parseFloat(secMatch[1]); matched = true; }
  if (!matched) {
    const bare = str.match(/(\d+(?:\.\d+)?)/);
    if (bare) { total = parseFloat(bare[1]) * 60; matched = true; }
  }
  return matched && total > 0 ? Math.round(total) : null;
}

function getActiveDayIndex() {
  if (!STATE.plan || !STATE.plan.week) return 0;
  const week = STATE.plan.week;
  for (let i = 0; i < week.length; i++) {
    if (!STATE.dayProgress[i]) return i;
  }
  return week.length;
}

function buildDaySequence(day) {
  const warmup = (day.warmup || []).map((item, subIndex) => ({ type: 'warmup', item, subIndex }));
  const exercises = (day.exercises || []).map((item, subIndex) => ({ type: 'exercise', item, subIndex }));
  const cooldown = (day.cooldown || []).map((item, subIndex) => ({ type: 'cooldown', item, subIndex }));
  return [...warmup, ...exercises, ...cooldown];
}

function sequenceItemKey(dIdx, entry) {
  if (entry.type === 'warmup') return `w${dIdx}-${entry.subIndex}`;
  if (entry.type === 'cooldown') return `c${dIdx}-${entry.subIndex}`;
  return `${dIdx}-${entry.subIndex}`;
}

// If a plan already exists from a previous visit, skip straight to home
if (STATE.plan && STATE.name) STATE.screen = 'home';

function render() {
  const frame = document.getElementById('phoneFrame');
  if (STATE.screen === 'profile') frame.innerHTML = renderProfile();
  else if (STATE.screen === 'experience') frame.innerHTML = renderExperience();
  else if (STATE.screen === 'days') frame.innerHTML = renderDays();
  else if (STATE.screen === 'goal') frame.innerHTML = renderGoal();
  else if (STATE.screen === 'loading') frame.innerHTML = renderLoading();
  else if (STATE.screen === 'home') frame.innerHTML = renderHome();
  else if (STATE.screen === 'session') frame.innerHTML = renderSession();
  else if (STATE.screen === 'summary') frame.innerHTML = renderSummary();
  attachListeners();
}

function renderProfile() {
  return `
    <div class="screen active" style="justify-content:center;">
      <div class="eyebrow">Welcome</div>
      <h1>What should we call you?</h1>
      <p class="text-secondary" style="margin-top:8px;">No password needed — just personalizes your plan on this device.</p>
      <input id="nameInput" type="text" placeholder="Your name" value="${STATE.name}"
        style="margin-top:24px; min-height:56px; background:var(--bg-surface); border:2px solid #2E2E2E; border-radius:14px; padding:0 16px; color:white; font-size:16px; width:100%; font-family:'Inter',sans-serif;" />
      <button class="btn-primary" style="margin-top:20px;" id="profileContinueBtn">Continue</button>
    </div>`;
}

function renderExperience() {
  const exp = STATE.onboarding.experience_level;
  return `
    <div class="screen active">
      <div class="progress-dots"><span class="done"></span><span></span><span></span></div>
      <div class="eyebrow">GymBuddy</div>
      <h1>Hi ${STATE.name} 👋</h1>
      <div class="avatar-dock" style="margin-top:18px;">
        <div class="avatar-bubble">🧑‍🏫</div>
        <div class="avatar-speech">Are you a beginner, or do you already train regularly?</div>
      </div>
      <div class="option-stack" data-field="experience_level">
        <button class="option-chip ${exp==='beginner'?'selected':''}" data-value="beginner">🌱 Beginner</button>
        <button class="option-chip ${exp==='some_experience'?'selected':''}" data-value="some_experience">💪 Some experience</button>
        <button class="option-chip ${exp==='experienced'?'selected':''}" data-value="experienced">🔥 Experienced</button>
      </div>
      <button class="btn-primary" id="continueBtn" ${!exp?'disabled':''}>Continue</button>
    </div>`;
}

function renderDays() {
  const days = STATE.onboarding.days_available;
  return `
    <div class="screen active">
      <div class="progress-dots"><span class="done"></span><span class="done"></span><span></span></div>
      <h2>How many days a week can you train?</h2>
      <div class="option-stack" data-field="days_available" style="margin-top:16px;">
        <button class="option-chip ${days==='2'?'selected':''}" data-value="2">2 days</button>
        <button class="option-chip ${days==='3'?'selected':''}" data-value="3">3 days</button>
        <button class="option-chip ${days==='4'?'selected':''}" data-value="4">4 days</button>
        <button class="option-chip ${days==='5'?'selected':''}" data-value="5">5+ days</button>
      </div>
      <button class="btn-primary" id="continueBtn" ${!days?'disabled':''}>Continue</button>
    </div>`;
}

function renderGoal() {
  const goal = STATE.onboarding.goal;
  return `
    <div class="screen active">
      <div class="progress-dots"><span class="done"></span><span class="done"></span><span class="done"></span></div>
      <h2>What's your main goal?</h2>
      <div class="option-stack" data-field="goal" style="margin-top:16px;">
        <button class="option-chip ${goal==='general_fitness'?'selected':''}" data-value="general_fitness">⚡ General fitness</button>
        <button class="option-chip ${goal==='lose_weight'?'selected':''}" data-value="lose_weight">🔥 Lose weight</button>
        <button class="option-chip ${goal==='build_muscle'?'selected':''}" data-value="build_muscle">💪 Build muscle</button>
        <button class="option-chip ${goal==='get_stronger'?'selected':''}" data-value="get_stronger">🏋️ Get stronger</button>
      </div>
      <button class="btn-primary" id="generatePlanBtn" ${!goal?'disabled':''}>Generate My Week</button>
      ${STATE.error ? `<div class="error-box">${STATE.error}</div>` : ''}
    </div>`;
}

function renderLoading() {
  return `
    <div class="screen active loading-wrap">
      <div class="spinner"></div>
      <div style="font-family:'Sora',sans-serif; font-weight:700;">Building your week...</div>
      <div class="text-secondary" style="font-size:13px;">Personalizing based on your answers</div>
    </div>`;
}

function renderHome() {
  if (!STATE.plan || !STATE.plan.week) return renderGoal();
  const week = STATE.plan.week;
  const dIdx = getActiveDayIndex();

  if (dIdx >= week.length) {
    return `
      <div class="screen active" style="justify-content:center; text-align:center;">
        <div style="font-size:56px;">🎉</div>
        <h1 style="margin-top:12px;">Week complete!</h1>
        <p class="text-secondary" style="margin-top:8px;">You finished every day in this week's plan. Nice work, ${escapeHtml(STATE.name)}.</p>
        <div class="progress-card-sub" style="margin-top:16px;">🔥 ${STATE.streak}-day streak</div>
        <button class="btn-ghost" id="restartBtn" style="margin-top:24px;">Start over with new answers</button>
      </div>`;
  }

  const day = week[dIdx];
  const warmupCount = (day.warmup || []).length;
  const exerciseCount = (day.exercises || []).length;
  const cooldownCount = (day.cooldown || []).length;

  return `
    <div class="screen active">
      <div class="eyebrow">Today</div>
      <h1 style="font-size:22px;">Nice to have you, ${escapeHtml(STATE.name)}.</h1>
      <div class="progress-card-sub" style="margin-top:6px;">🔥 ${STATE.streak}-day streak · Day ${dIdx + 1} of ${week.length}</div>
      <div class="day-card">
        <div class="day-title">Day ${dIdx + 1} — ${escapeHtml(day.focus)}</div>
        <div class="day-focus">${warmupCount} warmup, ${exerciseCount} exercises, ${cooldownCount} cooldown</div>
        <button class="btn-primary" id="startDayBtn">Start Day</button>
      </div>
      <button class="btn-ghost" id="restartBtn">Start over with new answers</button>
    </div>`;
}

function renderSessionStaticItem(item, status, badge) {
  return `
    <div class="session-item-row">
      <div class="session-item-badge">${badge}</div>
      <div style="flex:1; min-width:0;">
        <div class="session-item-name">${escapeHtml(item.name)}</div>
      </div>
      <div class="session-status-icon ${status === 'locked' ? 'locked' : ''}">${status === 'completed' ? '✓' : '🔒'}</div>
    </div>`;
}

function renderSessionTimerCurrent(item, key, idx, badge) {
  const seconds = parseDurationToSeconds(item.duration);
  const timer = STATE.timers[key];
  let timerControlHtml = '';
  if (seconds) {
    if (timer && timer.done) {
      timerControlHtml = `<div class="timer-done">✓ Done!</div>`;
    } else if (timer) {
      timerControlHtml = `<div class="timer-display" id="timer-${key}">${formatTime(timer.remaining)}</div>`;
    } else {
      timerControlHtml = `<button class="btn-timer-start" data-timer-key="${key}" data-timer-seconds="${seconds}" data-sequence-index="${idx}">▶ Start</button>`;
    }
  }
  return `
    <div class="session-item-row">
      <div class="session-item-badge">${badge}</div>
      <div style="flex:1; min-width:0;">
        <div class="session-item-name">${escapeHtml(item.name)}</div>
        <div class="session-item-meta">${escapeHtml(item.duration)}</div>
      </div>
      ${timerControlHtml}
    </div>
    <div class="session-item-instructions">${escapeHtml(item.instructions)}</div>
    <div class="session-item-controls">
      <button class="btn-skip" data-skip-index="${idx}">Skip</button>
    </div>`;
}

function renderSessionExerciseCurrent(item, key, idx) {
  const expanded = !!STATE.expanded[key];
  const cachedVideoId = STATE.videoCache[key];
  const loadingVideo = !!STATE.videoLoading[key];
  const videoError = STATE.videoError[key];

  let videoAreaHtml = '';
  if (cachedVideoId) {
    videoAreaHtml = `<iframe class="video-embed" src="https://www.youtube.com/embed/${escapeHtml(cachedVideoId)}" title="${escapeHtml(item.name)} demo" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  } else if (loadingVideo) {
    videoAreaHtml = `<div class="video-loading">Loading demo…</div>`;
  } else if (videoError) {
    videoAreaHtml = `<div class="video-error">${escapeHtml(videoError)}</div>`;
  }

  const detailHtml = expanded ? `
    <div class="session-item-instructions">${escapeHtml(item.instructions)}</div>
    ${item.alternative ? `<div class="session-item-alt">Alternative: ${escapeHtml(item.alternative)}</div>` : ''}
    <div class="coach-badge" style="margin-left:30px;">🎥 Live AI Coach — Coming in v2</div>` : '';

  return `
    <div class="session-item-row">
      <div class="session-item-badge">💪</div>
      <div class="exercise-tap-area" data-expand-key="${key}">
        <div class="session-item-name">${escapeHtml(item.name)}</div>
        <div class="session-item-meta">${item.sets} sets × ${escapeHtml(item.reps)}</div>
      </div>
      <button class="play-icon-btn" data-video-key="${key}" data-search-term="${escapeHtml(item.video_search_term || item.name)}" ${(cachedVideoId || loadingVideo) ? 'disabled' : ''} title="Watch demo">${loadingVideo ? '⏳' : '▶️'}</button>
      <div class="expand-caret" data-expand-key="${key}">${expanded ? '▲' : '▼'}</div>
    </div>
    ${videoAreaHtml ? `<div class="video-area">${videoAreaHtml}</div>` : ''}
    ${detailHtml}
    <div class="session-item-controls">
      <button class="btn-done" data-done-index="${idx}">✓ Done</button>
      <button class="btn-skip" data-skip-index="${idx}">Skip</button>
    </div>`;
}

function renderSessionItem(entry, idx, status, dIdx) {
  const { type, item } = entry;
  const key = sequenceItemKey(dIdx, entry);
  const badge = type === 'warmup' ? '🔥' : type === 'cooldown' ? '🧊' : '💪';

  let inner;
  if (status === 'completed' || status === 'locked') {
    inner = renderSessionStaticItem(item, status, badge);
  } else if (type === 'exercise') {
    inner = renderSessionExerciseCurrent(item, key, idx);
  } else {
    inner = renderSessionTimerCurrent(item, key, idx, badge);
  }

  return `<div class="session-item session-item-${status}">${inner}</div>`;
}

function renderSession() {
  if (!STATE.plan || !STATE.plan.week) return renderGoal();
  const dIdx = getActiveDayIndex();
  const day = STATE.plan.week[dIdx];
  if (!day) { STATE.screen = 'home'; return renderHome(); }

  const sequence = buildDaySequence(day);
  const total = sequence.length;
  let currentIndex = 0;
  while (currentIndex < total && STATE.sequenceProgress[currentIndex]) currentIndex++;

  const itemsHtml = sequence.map((entry, idx) => {
    const status = idx < currentIndex ? 'completed' : idx === currentIndex ? 'current' : 'locked';
    return renderSessionItem(entry, idx, status, dIdx);
  }).join('');

  const allDone = currentIndex >= total;
  const pct = total ? Math.round((Math.min(currentIndex, total) / total) * 100) : 0;

  return `
    <div class="screen active">
      <div class="eyebrow">Day ${dIdx + 1} of ${STATE.plan.week.length}</div>
      <h1 style="font-size:22px;">${escapeHtml(day.focus)}</h1>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
      <div class="session-progress-label">${Math.min(currentIndex, total)} of ${total} complete</div>
      <div>
        ${itemsHtml}
      </div>
      ${allDone ? `<button class="btn-primary" id="finishDayBtn" style="margin-top:18px;">Finish Day</button>` : ''}
      <button class="btn-ghost" id="backToHomeBtn">Back to Home</button>
    </div>`;
}

function renderSummary() {
  if (!STATE.plan || !STATE.plan.week) return renderGoal();
  const dIdx = getActiveDayIndex();
  const day = STATE.plan.week[dIdx];
  if (!day) { STATE.screen = 'home'; return renderHome(); }

  const meals = (day.meal_suggestions || []).map((m) => `<li>${escapeHtml(m)}</li>`).join('');
  const cravings = (day.craving_alternatives || []).map((c) => `<li>${escapeHtml(c)}</li>`).join('');

  return `
    <div class="screen active">
      <div style="text-align:center;">
        <div style="font-size:48px;">🎉</div>
        <h1 style="margin-top:10px;">Day ${dIdx + 1} Complete!</h1>
      </div>
      <div class="progress-card">
        <div class="progress-card-title">Estimated Calories Burned</div>
        <div class="progress-card-value" style="margin-top:6px;">~${escapeHtml(day.calorie_estimate)}</div>
        <div class="progress-card-sub">This is a rough estimate, not precise tracking.</div>
      </div>
      <div class="phase-label" style="margin-top:18px;">🍽 Post-Workout Meal Ideas</div>
      <ul class="summary-list">${meals}</ul>
      <div class="phase-label" style="margin-top:18px;">🍫 Craving Swaps</div>
      <ul class="summary-list">${cravings}</ul>
      <button class="btn-primary" id="markDayCompleteBtn" style="margin-top:24px;">Mark Day Complete &amp; Continue</button>
    </div>`;
}

function attachListeners() {
  const profileBtn = document.getElementById('profileContinueBtn');
  if (profileBtn) profileBtn.addEventListener('click', () => {
    const val = document.getElementById('nameInput').value.trim();
    STATE.name = val || 'there';
    localStorage.setItem(STORAGE_KEYS.name, STATE.name);
    STATE.screen = 'experience';
    render();
  });

  document.querySelectorAll('.option-chip').forEach((chip) => {
    chip.addEventListener('click', () => {
      const stack = chip.closest('.option-stack');
      const field = stack.dataset.field;
      stack.querySelectorAll('.option-chip').forEach((c) => c.classList.remove('selected'));
      chip.classList.add('selected');
      STATE.onboarding[field] = chip.dataset.value;
      localStorage.setItem(STORAGE_KEYS.onboarding, JSON.stringify(STATE.onboarding));
      render();
    });
  });

  const continueBtn = document.getElementById('continueBtn');
  if (continueBtn) continueBtn.addEventListener('click', () => {
    if (STATE.screen === 'experience') STATE.screen = 'days';
    else if (STATE.screen === 'days') STATE.screen = 'goal';
    render();
  });

  const generateBtn = document.getElementById('generatePlanBtn');
  if (generateBtn) generateBtn.addEventListener('click', generatePlan);

  const startDayBtn = document.getElementById('startDayBtn');
  if (startDayBtn) startDayBtn.addEventListener('click', () => {
    STATE.screen = 'session';
    render();
  });

  const backToHomeBtn = document.getElementById('backToHomeBtn');
  if (backToHomeBtn) backToHomeBtn.addEventListener('click', () => {
    STATE.screen = 'home';
    render();
  });

  const finishDayBtn = document.getElementById('finishDayBtn');
  if (finishDayBtn) finishDayBtn.addEventListener('click', () => {
    STATE.screen = 'summary';
    render();
  });

  const markDayCompleteBtn = document.getElementById('markDayCompleteBtn');
  if (markDayCompleteBtn) markDayCompleteBtn.addEventListener('click', () => {
    const dIdx = getActiveDayIndex();
    clearAllTimers();
    STATE.dayProgress[dIdx] = true;
    STATE.sequenceProgress = {};
    STATE.expanded = {};
    STATE.videoCache = {};
    STATE.videoLoading = {};
    STATE.videoError = {};
    localStorage.setItem(STORAGE_KEYS.dayProgress, JSON.stringify(STATE.dayProgress));
    localStorage.setItem(STORAGE_KEYS.sequenceProgress, JSON.stringify(STATE.sequenceProgress));
    bumpStreakIfNeeded();
    STATE.screen = 'home';
    render();
  });

  document.querySelectorAll('[data-expand-key]').forEach((el) => {
    el.addEventListener('click', () => {
      const key = el.dataset.expandKey;
      STATE.expanded[key] = !STATE.expanded[key];
      render();
    });
  });

  document.querySelectorAll('.play-icon-btn[data-video-key]').forEach((btn) => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const key = btn.dataset.videoKey;
      const searchTerm = btn.dataset.searchTerm;
      STATE.videoLoading[key] = true;
      STATE.videoError[key] = null;
      render();
      try {
        const response = await fetch('/api/get-video', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ searchTerm }),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to load video');
        STATE.videoCache[key] = data.videoId;
      } catch (err) {
        STATE.videoError[key] = err.message;
      } finally {
        STATE.videoLoading[key] = false;
        render();
      }
    });
  });

  document.querySelectorAll('.btn-timer-start[data-timer-key]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.timerKey;
      const totalSeconds = parseInt(btn.dataset.timerSeconds, 10);
      if (!totalSeconds || STATE.timers[key]) return;
      const timer = { remaining: totalSeconds, total: totalSeconds, done: false, intervalId: null };
      if (btn.dataset.sequenceIndex !== undefined) timer.sequenceIndex = parseInt(btn.dataset.sequenceIndex, 10);
      STATE.timers[key] = timer;
      timer.intervalId = setInterval(() => tickTimer(key), 1000);
      render();
    });
  });

  document.querySelectorAll('.btn-skip[data-skip-index]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.skipIndex, 10);
      Object.values(STATE.timers).forEach((t) => {
        if (t.sequenceIndex === idx && t.intervalId) { clearInterval(t.intervalId); t.intervalId = null; }
      });
      advanceSequence(idx);
    });
  });

  document.querySelectorAll('.btn-done[data-done-index]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.doneIndex, 10);
      advanceSequence(idx);
    });
  });

  const restartBtn = document.getElementById('restartBtn');
  if (restartBtn) restartBtn.addEventListener('click', () => {
    if (!confirm('This clears your current plan and progress. Continue?')) return;
    clearAllTimers();
    localStorage.removeItem(STORAGE_KEYS.plan);
    localStorage.removeItem(STORAGE_KEYS.dayProgress);
    localStorage.removeItem(STORAGE_KEYS.sequenceProgress);
    localStorage.removeItem(STORAGE_KEYS.onboarding);
    STATE.plan = null;
    STATE.dayProgress = {};
    STATE.sequenceProgress = {};
    STATE.expanded = {};
    STATE.videoCache = {};
    STATE.videoLoading = {};
    STATE.videoError = {};
    STATE.onboarding = { experience_level: null, days_available: null, goal: null, injuries: '' };
    STATE.screen = 'experience';
    render();
  });
}

function advanceSequence(index) {
  STATE.sequenceProgress[index] = true;
  localStorage.setItem(STORAGE_KEYS.sequenceProgress, JSON.stringify(STATE.sequenceProgress));
  render();
}

function tickTimer(key) {
  const timer = STATE.timers[key];
  if (!timer) return;
  timer.remaining -= 1;
  if (timer.remaining <= 0) {
    timer.remaining = 0;
    timer.done = true;
    clearInterval(timer.intervalId);
    timer.intervalId = null;
    if (timer.sequenceIndex !== undefined) {
      advanceSequence(timer.sequenceIndex);
    } else {
      render();
    }
  } else {
    const el = document.getElementById(`timer-${key}`);
    if (el) el.textContent = formatTime(timer.remaining);
  }
}

function clearAllTimers() {
  Object.values(STATE.timers).forEach((t) => { if (t.intervalId) clearInterval(t.intervalId); });
  STATE.timers = {};
}

async function generatePlan() {
  STATE.screen = 'loading';
  STATE.error = null;
  render();

  try {
    const response = await fetch('/api/generate-plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(STATE.onboarding),
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Failed to generate plan');
    STATE.plan = data;
    STATE.dayProgress = {};
    STATE.sequenceProgress = {};
    localStorage.setItem(STORAGE_KEYS.plan, JSON.stringify(data));
    localStorage.setItem(STORAGE_KEYS.dayProgress, JSON.stringify(STATE.dayProgress));
    localStorage.setItem(STORAGE_KEYS.sequenceProgress, JSON.stringify(STATE.sequenceProgress));
    STATE.screen = 'home';
    render();
  } catch (err) {
    STATE.error = "Couldn't generate your plan: " + err.message + '. Please try again.';
    STATE.screen = 'goal';
    render();
  }
}

function bumpStreakIfNeeded() {
  const today = new Date().toDateString();
  const lastActive = localStorage.getItem(STORAGE_KEYS.lastActiveDay);
  if (lastActive !== today) {
    STATE.streak += 1;
    localStorage.setItem(STORAGE_KEYS.lastActiveDay, today);
    localStorage.setItem(STORAGE_KEYS.streak, String(STATE.streak));
  }
}

render();
</script>
</body>
</html>
