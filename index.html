<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GymBuddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --bg-base: #121212;
    --bg-surface: #1E1E1E;
    --bg-surface-raised: #262626;
    --accent-primary: #39FF14;
    --accent-primary-dim: #2BC010;
    --accent-warn: #FFBF00;
    --text-primary: #FFFFFF;
    --text-secondary: #9CA3AF;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --tap-target-min: 56px;
    --tap-target-sm: 48px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at 30% 20%, #1a1a1a 0%, #0d0d0d 55%, #050505 100%);
    color: var(--text-primary);
    min-height: 100vh; min-height: 100dvh;
    display: flex; justify-content: center; align-items: center;
    padding: 12px; -webkit-font-smoothing: antialiased;
  }
  .phone-frame {
    width: 100%; max-width: 420px; height: 100%; max-height: 800px; min-height: 560px;
    background: var(--bg-base); border-radius: 32px; border: 1px solid #2A2A2A;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .screen { display: none; flex-direction: column; padding: 24px 16px; position: relative; overflow-y: auto; height: 100%; }
  .screen.active { display: flex; animation: screenIn 0.32s cubic-bezier(0.16,1,0.3,1); }
  @keyframes screenIn { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: translateX(0); } }

  h1 { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 800; line-height: 1.2; letter-spacing: -0.02em; }
  h2 { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .text-secondary { color: var(--text-secondary); font-size: 14px; line-height: 1.5; }
  .eyebrow { font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent-primary); text-transform: uppercase; margin-bottom: 10px; }

  .btn-primary {
    min-height: var(--tap-target-min); background: var(--accent-primary); color: #0A1A05; border: none;
    border-radius: var(--radius-md); font-family: 'Sora', sans-serif; font-weight: 700; font-size: 16px;
    letter-spacing: -0.01em; cursor: pointer; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 0 24px rgba(57,255,20,0.25); transition: transform 0.12s ease;
  }
  .btn-primary:active { background: var(--accent-primary-dim); transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.4; box-shadow: none; }

  .option-chip {
    min-height: var(--tap-target-min); background: var(--bg-surface); border: 2px solid #2E2E2E;
    border-radius: var(--radius-md); color: var(--text-primary); font-size: 16px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; padding: 0 18px;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.12s ease;
  }
  .option-chip:active { transform: scale(0.97); }
  .option-chip.selected {
    border-color: var(--accent-primary); background: rgba(57,255,20,0.08); color: var(--accent-primary);
    animation: chipPop 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes chipPop { 0% { transform: scale(1); } 40% { transform: scale(1.03); } 100% { transform: scale(1); } }
  .option-stack { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }

  .avatar-dock { display: flex; align-items: flex-end; gap: 10px; }
  .avatar-bubble {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(145deg, var(--accent-primary), #1FA80A);
    display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
    box-shadow: 0 0 20px rgba(57,255,20,0.4);
  }
  .avatar-speech {
    background: var(--bg-surface-raised); border: 1px solid #333; border-radius: var(--radius-md);
    border-bottom-left-radius: 4px; padding: 12px 14px; font-size: 14px; font-weight: 600; max-width: 260px;
  }

  .progress-dots { display: flex; gap: 6px; margin-bottom: 18px; }
  .progress-dots span { height: 4px; flex: 1; border-radius: 2px; background: #2A2A2A; }
  .progress-dots span.done { background: var(--accent-primary); }

  .progress-card { background: var(--bg-surface); border-radius: var(--radius-lg); padding: 20px; margin-top: 12px; }
  .progress-card-title { font-size: 15px; font-weight: 700; }
  .progress-card-value { font-family: 'Sora', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent-primary); }
  .progress-track { height: 10px; background: #2A2A2A; border-radius: 5px; overflow: hidden; margin-top: 12px; }
  .progress-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--accent-primary-dim), var(--accent-primary)); border-radius: 5px; transform-origin: left; transition: transform 0.3s ease; }
  .progress-card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 8px; }

  .day-card { border-left: 4px solid var(--accent-primary); background: var(--bg-surface); border-radius: 12px; padding: 16px; margin-top: 12px; }
  .day-title { font-family: 'Sora', sans-serif; font-weight: 700; color: var(--accent-primary); font-size: 16px; }
  .day-focus { font-size: 13px; color: var(--text-secondary); margin-top: 4px; margin-bottom: 10px; }

  .phase-label { font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; }

  .btn-timer-start { min-height: var(--tap-target-sm); background: none; border: 1.5px solid var(--accent-primary); color: var(--accent-primary); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; padding: 0 14px; flex-shrink: 0; white-space: nowrap; }
  .timer-display { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 800; color: var(--accent-primary); flex-shrink: 0; min-width: 46px; text-align: right; }

  .exercise-tap-area { flex: 1; min-width: 0; cursor: pointer; }
  .btn-video-pill {
    min-height: var(--tap-target-sm); background: rgba(57,255,20,0.08); border: 1.5px solid var(--accent-primary);
    color: var(--accent-primary); border-radius: 999px; font-size: 12px; font-weight: 700;
    cursor: pointer; padding: 0 14px; flex-shrink: 0; white-space: nowrap;
  }
  .btn-video-pill:disabled { opacity: 0.4; cursor: default; }
  .video-area { padding: 0 0 4px 30px; margin-top: 2px; }
  .video-embed { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-sm); margin-top: 6px; border: none; display: block; }
  .video-loading { font-size: 12px; color: var(--text-secondary); padding: 4px 0; }
  .video-error { font-size: 11px; color: #FF8080; margin-top: 6px; }

  .seg-toggle { display: flex; border: 1.5px solid #333; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
  .seg-btn {
    min-height: var(--tap-target-sm); background: none; border: none; color: var(--text-secondary);
    font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 700; padding: 0 10px; cursor: pointer;
  }
  .seg-btn.active { background: rgba(57,255,20,0.12); color: var(--accent-primary); }

  /* Exercise detail redesign: media tabs, action row, full-width CTA, accordion */
  .media-tabs { display: flex; border: 1.5px solid #333; border-radius: 12px; overflow: hidden; margin-top: 12px; }
  .media-tab {
    flex: 1; min-height: var(--tap-target-sm); background: none; border: none; color: var(--text-secondary);
    font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer;
  }
  .media-tab.active { background: rgba(57,255,20,0.12); color: var(--accent-primary); }
  .media-stage { margin-top: 10px; }
  .video-placeholder {
    background: rgba(255,255,255,0.03); border: 1.5px dashed #333; border-radius: var(--radius-sm);
    padding: 22px 12px; text-align: center;
  }
  .action-row { display: flex; gap: 10px; margin-top: 12px; }
  .action-stat { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid #2A2A2A; border-radius: 10px; padding: 10px 12px; text-align: center; }
  .action-stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); }
  .action-stat-value { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 800; margin-top: 3px; }
  .set-progress-label { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-align: center; margin-top: 12px; }
  .btn-start-set {
    width: 100%; min-height: 54px; background: var(--accent-primary); color: #0A1A05; border: none;
    border-radius: var(--radius-sm); font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 800;
    cursor: pointer; margin-top: 8px;
  }
  .accordion-toggle {
    width: 100%; min-height: var(--tap-target-sm); background: none; border: none; border-top: 1px solid #2A2A2A;
    color: var(--text-secondary); font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 12px;
    display: flex; align-items: center; justify-content: space-between; padding: 0 2px;
  }
  .accordion-body .session-item-instructions { padding-left: 0; margin-top: 2px; }
  .accordion-body .alt-swap-btn { margin-left: 0; }

  /* Coach Avatar — pure CSS, two states: exercising (squat bounce synced to rep
     cadence) and resting (slow breathing). All animation on transform/opacity. */
  .coach-avatar-wrap { text-align: center; padding: 10px 0 2px; }
  .coach-figure { display: inline-flex; align-items: center; gap: 8px; }
  .coach-emoji { font-size: 64px; line-height: 1; display: inline-block; }
  .coach-line { width: 18px; height: 3px; border-radius: 2px; background: var(--accent-primary); opacity: 0; }
  /* 3s = SECONDS_PER_REP, so one dip per counted rep */
  .coach-figure.exercising .coach-emoji { animation: coachSquat 3s ease-in-out infinite; }
  .coach-figure.exercising .coach-line { animation: motionLine 3s ease-in-out infinite; }
  .coach-figure.exercising .coach-line-right { animation-delay: 0.15s; }
  .coach-figure.resting .coach-emoji { animation: coachBreathe 3.2s ease-in-out infinite; }
  @keyframes coachSquat { 0%, 100% { transform: translateY(0) scaleY(1); } 40% { transform: translateY(10px) scaleY(0.9); } 60% { transform: translateY(10px) scaleY(0.9); } }
  @keyframes motionLine { 0%, 100% { opacity: 0; transform: translateY(0); } 40% { opacity: 0.9; transform: translateY(10px); } 60% { opacity: 0.9; transform: translateY(10px); } }
  @keyframes coachBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .coach-ground { width: 70px; height: 8px; border-radius: 50%; background: rgba(57,255,20,0.15); margin: 2px auto 0; }
  .coach-avatar-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

  .session-progress-label { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
  .session-phase-header {
    font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-secondary);
    margin: 18px 0 2px; padding-bottom: 6px; border-bottom: 1px solid #2A2A2A;
  }
  .session-item { background: var(--bg-surface); border-radius: 12px; padding: 12px 14px; margin-top: 10px; transition: opacity 0.2s ease; }
  .session-item-completed { opacity: 0.45; }
  .session-item-locked { opacity: 0.35; }
  .session-item-current { border: 1.5px solid var(--accent-primary); box-shadow: 0 0 16px rgba(57,255,20,0.15); }
  .session-item-row { display: flex; align-items: center; gap: 10px; }
  .session-item-badge { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
  .session-item-name { font-weight: 600; font-size: 14px; }
  .session-item-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .session-status-icon { font-size: 15px; flex-shrink: 0; color: var(--accent-primary); }
  .session-status-icon.locked { color: var(--text-secondary); }
  .session-item-instructions { font-size: 12px; color: var(--text-secondary); margin-top: 8px; line-height: 1.4; padding-left: 30px; }
  .session-item-controls { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding-left: 30px; flex-wrap: wrap; }
  .btn-skip { min-height: var(--tap-target-sm); background: none; border: 1.5px solid #444; color: var(--text-secondary); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; padding: 0 14px; }
  .btn-skip.active-toggle { border-color: var(--accent-primary); color: var(--accent-primary); }
  .btn-done { min-height: var(--tap-target-sm); background: var(--accent-primary); color: #0A1A05; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; cursor: pointer; padding: 0 16px; }

  .set-label { font-size: 13px; font-weight: 700; }
  .rep-counter-wrap { text-align: center; padding: 12px 0 4px; }
  .rep-number { font-family: 'Sora', sans-serif; font-size: 64px; font-weight: 800; color: var(--accent-primary); line-height: 1; display: inline-block; }
  .rep-number.pulse { animation: repPulse 0.4s ease; }
  @keyframes repPulse { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }
  .skip-exercise-link {
    background: none; border: none; color: var(--text-secondary); font-size: 12px; text-decoration: underline;
    cursor: pointer; margin-top: 6px; padding-left: 30px; min-height: var(--tap-target-sm);
    display: flex; align-items: center;
  }
  .alt-swap-btn {
    min-height: var(--tap-target-sm); background: none; border: 1.5px solid var(--accent-warn); color: var(--accent-warn);
    border-radius: 8px; font-size: 12px; font-weight: 600; padding: 0 12px; margin: 8px 0 0 30px; cursor: pointer; display: inline-flex; align-items: center;
  }
  .swap-label { font-size: 11px; color: var(--accent-warn); margin-top: 2px; }

  .meal-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .meal-chip {
    flex: 1 1 40%; min-height: var(--tap-target-sm); background: var(--bg-surface); border: 2px solid #2E2E2E;
    border-radius: var(--radius-sm); color: var(--text-primary); font-size: 14px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .meal-chip.selected { border-color: var(--accent-primary); background: rgba(57,255,20,0.08); color: var(--accent-primary); }

  .summary-list { list-style: none; margin-top: 8px; }
  .summary-list li { font-size: 13px; color: var(--text-primary); background: var(--bg-surface); padding: 12px; border-radius: 8px; margin-top: 6px; }
  .meal-idea-name { font-weight: 700; font-size: 14px; }
  .meal-idea-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .recipe-steps { margin: 10px 0 0 18px; }
  .recipe-steps li { background: none; padding: 3px 0; margin: 0; font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .ingredient-list { list-style: none; margin-top: 10px; }
  .ingredient-list li { background: none; padding: 3px 0; margin: 0; font-size: 12px; line-height: 1.5; }
  .ingredient-alt { color: var(--text-secondary); }

  .fact-card {
    background: var(--bg-surface); border: 1px solid #2A2A2A; border-radius: var(--radius-md);
    padding: 18px 20px; max-width: 300px; animation: factFloat 3s ease-in-out infinite;
  }
  @keyframes factFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  .fact-label { font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent-primary); margin-bottom: 8px; }
  .fact-text { font-size: 14px; line-height: 1.5; opacity: 1; transition: opacity 0.3s ease; }
  .fact-text.fact-fade { opacity: 0; }

  .weight-input-wrap { display: flex; align-items: center; gap: 12px; margin-top: 24px; }
  .weight-input {
    min-height: 56px; background: var(--bg-surface); border: 2px solid #2E2E2E; border-radius: 14px;
    padding: 0 16px; color: white; font-size: 18px; width: 100%; font-family: 'Inter', sans-serif;
  }
  .weight-unit { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700; color: var(--text-secondary); }
  .injuries-input {
    min-height: 110px; background: var(--bg-surface); border: 2px solid #2E2E2E; border-radius: 14px;
    padding: 14px 16px; color: white; font-size: 15px; width: 100%; font-family: 'Inter', sans-serif;
    resize: none; margin-top: 20px; line-height: 1.5;
  }

  .sheet-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: flex-end; z-index: 50; }
  .bottom-sheet {
    width: 100%; background: var(--bg-surface-raised); border-radius: 20px 20px 0 0;
    padding: 22px 20px 24px; animation: sheetUp 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes sheetUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .loading-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 18px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #2A2A2A; border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(255,80,80,0.1); border: 1px solid #663333; color: #FF8080; padding: 12px; border-radius: 10px; font-size: 13px; margin-top: 10px; }

  /* Gentle informational toast — lives outside the render cycle, auto-dismisses. */
  .toast-banner {
    position: fixed; left: 50%; bottom: 28px; transform: translate(-50%, 12px);
    width: min(340px, calc(100vw - 32px)); background: #14280C;
    border: 1px solid var(--accent-primary); color: var(--text-primary);
    padding: 12px 14px; border-radius: 12px; font-size: 12.5px; line-height: 1.45;
    text-align: center; z-index: 60; opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .toast-banner.show { opacity: 1; transform: translate(-50%, 0); }

  /* Polish round */
  .seg-toggle-sm { margin-left: auto; }
  .seg-toggle-sm .seg-btn { min-height: 32px; font-size: 10px; padding: 0 8px; }
  .btn-secondary {
    width: 100%; min-height: var(--tap-target-sm); background: none; border: 1.5px solid #555;
    color: var(--text-primary); border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
    cursor: pointer; margin-top: 10px;
  }
  .alt-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .alt-row-label { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }
  .alt-swap-pill {
    min-height: 36px; background: rgba(255,193,7,0.08); border: 1.5px solid var(--accent-warn);
    color: var(--accent-warn); border-radius: 999px; font-size: 12px; font-weight: 700;
    cursor: pointer; padding: 0 12px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .controls-centered { justify-content: center; padding-left: 0; }
  .info-btn {
    width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--text-secondary);
    background: none; color: var(--text-secondary); font-size: 11px; font-weight: 700; font-style: italic;
    cursor: pointer; vertical-align: middle; margin-left: 4px; line-height: 1;
  }
  .order-btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .btn-mini {
    min-height: 38px; background: none; border: 1.5px solid #444; color: var(--text-primary);
    border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; padding: 0 12px;
  }
  .upnext-card { background: var(--bg-surface); border-radius: 12px; padding: 12px 14px; margin-top: 12px; }
  .upnext-row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; padding: 4px 0; }
  .upnext-name { font-size: 13px; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .upnext-meta { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }
  .profile-avatar {
    width: 64px; height: 64px; border-radius: 50%; background: var(--bg-surface);
    border: 1.5px solid #333; font-size: 30px; display: flex; align-items: center;
    justify-content: center; margin: 0 auto;
  }
  .sync-pill {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    background: var(--bg-surface); border: 1px solid var(--accent-primary); color: var(--accent-primary);
    padding: 5px 12px; border-radius: 999px; font-size: 11px; font-weight: 700;
    z-index: 60; pointer-events: none;
  }

  /* Home header profile button */
  .profile-btn {
    min-width: var(--tap-target-sm); min-height: var(--tap-target-sm); flex-shrink: 0;
    background: var(--bg-surface); border: 1.5px solid #333; border-radius: 50%;
    font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* "This week" insights strip — pure CSS, no chart library */
  .insights-row { display: flex; gap: 8px; margin-top: 12px; }
  .insights-cell { flex: 1; background: var(--bg-surface); border-radius: 10px; padding: 10px 8px; text-align: center; }
  .insights-value { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 800; color: var(--accent-primary); }
  .insights-label { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-secondary); margin-top: 3px; }

// The API path enforces dietary preferences via the prompt; the offline
// fallbacks must comply too, so non-compliant dishes get swapped for safe
// ones and the dal recipe drops ghee/egg/curd mentions as needed.
const DIET_EXCLUDES = {
  vegetarian: /egg|chicken|fish|mutton/i,
  vegan: /egg|chicken|fish|mutton|curd|paneer|milk|ghee|butter/i,
  lactose_free: /curd|paneer|milk|cheese|butter/i,
};
const DIET_SAFE_IDEAS = {
  Breakfast: ['Peanut Vegetable Upma', 'Besan Chilla'],
  Lunch: ['Chole with Rice', 'Veg Khichdi with Salad'],
  Dinner: ['Veg Pulao with Salad', 'Dal with Jeera Rice'],
  Snack: ['Roasted Makhana', 'Fruit with Peanut Butter'],
};
function dietCompliantMeals(meals, mealType, pref) {
  const exclude = DIET_EXCLUDES[pref];
  if (!exclude) return meals;
  const pool = DIET_SAFE_IDEAS[mealType] || DIET_SAFE_IDEAS.Snack;
  let next = 0;
  return {
    ideas: meals.ideas.map((idea) => (exclude.test(idea) ? pool[next++ % pool.length] : idea)),
    cravingSwaps: meals.cravingSwaps.filter((s) => !exclude.test(s)),
  };
}
function dietCompliantRecipe(pref) {
  const r = deepCopy(FALLBACK_RECIPE);
  const noDairy = pref === 'vegan' || pref === 'lactose_free';
  const noEgg = pref === 'vegan' || pref === 'vegetarian';
  if (noDairy) {
    r.steps = r.steps.map((s) => s.replace('ghee or oil', 'oil'));
    r.ingredients = r.ingredients.map((i) => (i.name.indexOf('Ghee') === 0 ? { name: 'Oil (1 tsp)', alternative: 'any cooking oil' } : i));
  }
  if (noEgg || noDairy) {
    const protein = pref === 'vegan' ? 'roasted peanuts' : noEgg ? 'a bowl of curd' : 'a boiled egg';
    r.steps = r.steps.map((s) => s.replace('a boiled egg or bowl of curd', protein));
    r.ingredients = r.ingredients.map((i) => (i.name.indexOf('Rice or rotis') === 0 ? { name: i.name, alternative: protein + ' for extra protein' } : i));
  }
  return r;
}

// ---------- Persistence load (runs before first render) ----------
// Safe reads: a blocked localStorage or one corrupted key must never kill the
// whole script (which would otherwise silently reset the app to the name screen).
function readStored(key) {
  try {
    return localStorage.getItem(key);
  } catch (err) {
    console.log('[gymbuddy] localStorage read failed for "' + key + '":', err.message);
    return null;
  }
}
function readStoredJSON(key, fallback) {
  const raw = readStored(key);
  if (raw === null) return fallback;
  try {
    return JSON.parse(raw);
  } catch (err) {
    console.log('[gymbuddy] corrupted JSON in "' + key + '" — using fallback:', err.message);
    return fallback;
  }
}
// Writes get the same protection as reads: in private tabs, in-app webviews,
// or full-quota browsers setItem THROWS — an unhardened write inside
// generatePlan's catch would kill the whole flow and nothing would persist,
// making every reopen look like a fresh install (the "always lands on the
// name screen" bug). With these wrappers the session still works in memory
// and the console says exactly why persistence is unavailable.
function writeStored(key, value) {
  try {
    localStorage.setItem(key, value);
    return true;
  } catch (err) {
    console.log('[gymbuddy] localStorage WRITE failed for "' + key + '" — progress will not survive a reload:', err.message);
    return false;
  }
}
function removeStored(key) {
  try {
    localStorage.removeItem(key);
  } catch (err) {
    console.log('[gymbuddy] localStorage remove failed for "' + key + '":', err.message);
  }
}

// A stored plan is usable only if it carries the current schema version and
// every day has the fields the session screens depend on.
function isPlanValid(plan) {
  if (!plan || plan.schema_version !== PLAN_SCHEMA_VERSION) return false;
  if (!Array.isArray(plan.week) || plan.week.length === 0) return false;
  return plan.week.every(
    (day) =>
      day &&
      Array.isArray(day.warmup) && day.warmup.length > 0 &&
      Array.isArray(day.exercises) && day.exercises.length > 0 &&
      Array.isArray(day.cooldown) && day.cooldown.length > 0
  );
}

function escapeHtml(value) {
  if (value === null || value === undefined) return '';
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function parseDurationToSeconds(duration) {
  if (!duration) return null;
  const str = String(duration).toLowerCase();
  let total = 0;
  let matched = false;
  const minMatch = str.match(/(\d+(?:\.\d+)?)\s*(?:min|minute)/);
  const secMatch = str.match(/(\d+(?:\.\d+)?)\s*(?:sec|second)/);
  if (minMatch) { total += parseFloat(minMatch[1]) * 60; matched = true; }
  if (secMatch) { total += parseFloat(secMatch[1]); matched = true; }
  if (!matched) {
    const bare = str.match(/(\d+(?:\.\d+)?)/);
    if (bare) { total = parseFloat(bare[1]) * 60; matched = true; }
  }
  return matched && total > 0 ? Math.round(total) : null;
}

// "12" / "10 per leg" -> {type:'count', value:N}; "30 seconds" / "1 min" -> {type:'time', seconds:N}
function parseReps(reps) {
  if (reps === null || reps === undefined) return { type: 'count', value: 10 };
  const str = String(reps).toLowerCase();
  const secMatch = str.match(/(\d+(?:\.\d+)?)\s*(?:sec|second)/);
  if (secMatch) return { type: 'time', seconds: Math.round(parseFloat(secMatch[1])) };
  const minMatch = str.match(/(\d+(?:\.\d+)?)\s*(?:min|minute)/);
  if (minMatch) return { type: 'time', seconds: Math.round(parseFloat(minMatch[1]) * 60) };
  const numMatch = str.match(/(\d+)/);
  if (numMatch) return { type: 'count', value: parseInt(numMatch[1], 10) };
  return { type: 'count', value: 10 };
}

function focusIcon(focus) {
  const f = String(focus || '').toLowerCase();
  if (/leg|lower|glute|quad|calf/.test(f)) return '🦵';
  if (/push|pull|arm|upper|chest|back|shoulder|bicep|tricep/.test(f)) return '💪';
  if (/core|ab/.test(f)) return '🎯';
  return '🏋️';
}

function getActiveDayIndex() {
  if (!STATE.plan || !STATE.plan.week) return 0;
  const week = STATE.plan.week;
  for (let i = 0; i < week.length; i++) {
    if (!STATE.dayProgress[i]) return i;
  }
  return week.length;
}

function buildDaySequence(day) {
  const warmup = (day.warmup || []).map((item, subIndex) => ({ type: 'warmup', item, subIndex }));
  const exercises = (day.exercises || []).map((item, subIndex) => ({ type: 'exercise', item, subIndex }));
  const cooldown = (day.cooldown || []).map((item, subIndex) => ({ type: 'cooldown', item, subIndex }));
  return [...warmup, ...exercises, ...cooldown];
}

function sequenceItemKey(dIdx, entry) {
  if (entry.type === 'warmup') return `w${dIdx}-${entry.subIndex}`;
  if (entry.type === 'cooldown') return `c${dIdx}-${entry.subIndex}`;
  return `${dIdx}-${entry.subIndex}`;
}

function videoStateKey(key) {
  return STATE.swaps[key] ? `${key}:alt` : key;
}

function getExerciseDisplay(ex, key) {
  const swapped = !!(STATE.swaps[key] && ex.alternative);
  return {
    swapped,
    name: swapped ? ex.alternative : ex.name,
    searchTerm: swapped ? ex.alternative : (ex.video_search_term || ex.name),
    originalName: ex.name,
  };
}

// ---------- Tap debounce (ignore rapid double-taps) ----------

let lastTapAt = 0;
function guardTap(handler) {
  return function guarded(e) {
    const now = Date.now();
    if (now - lastTapAt < 300) return;
    lastTapAt = now;
    handler.call(this, e);
  };
}

// ---------- Timer engine (single active timer: phase countdown, rep counter, or rest) ----------

function persistWorkLog() {
  writeStored(STORAGE_KEYS.workLog, JSON.stringify(STATE.workLog));
}

function startActiveTimer(config) {
  stopActiveTimer();
  STATE.activeTimer = config;
  config.intervalId = setInterval(tick, 1000);
}

function stopActiveTimer() {
  if (STATE.activeTimer && STATE.activeTimer.intervalId) clearInterval(STATE.activeTimer.intervalId);
  STATE.activeTimer = null;
}

function tick() {
  const t = STATE.activeTimer;
  if (!t || t.paused) return;
  t.elapsed += 1;
  if (t.logWork) {
    STATE.workLog[t.key] = (STATE.workLog[t.key] || 0) + 1;
    persistWorkLog();
  }
  if (t.elapsed >= t.totalSeconds) {
    completeActiveTimer();
    return;
  }
  // Ticks update ONLY the changed DOM nodes — never a full render()
  if (t.kind === 'reps' && t.mode === 'reps') {
    const rep = Math.min(Math.floor(t.elapsed / SECONDS_PER_REP) + 1, t.totalReps);
    const el = document.getElementById('repNumber');
    if (el && el.textContent !== String(rep)) {
      el.textContent = rep;
      el.classList.remove('pulse');
      void el.offsetWidth;
      el.classList.add('pulse');
      // Coach avatar "counts with you" — restart the squat cycle at each rep boundary
      const fig = document.getElementById('coachFigure');
      if (fig) {
        fig.classList.remove('exercising');
        void fig.offsetWidth;
        fig.classList.add('exercising');
      }
    }
  } else {
    const el = document.getElementById('activeCountdown');
    if (el) el.textContent = formatTime(t.totalSeconds - t.elapsed);
  }
}

function completeActiveTimer() {
  const t = STATE.activeTimer;
  if (!t) return;
  stopActiveTimer();
  if (t.kind === 'phase') {
    advanceSequence(t.sequenceIndex);
    return;
  }
  if (t.kind === 'reps') {
    if (!STATE.setFlow || STATE.setFlow.setIndex >= t.totalSets - 1) {
      // Final set complete — exercise done
      STATE.setFlow = null;
      fireConfetti(false);
      advanceSequence(t.sequenceIndex);
    } else {
      // More sets remain — automatic rest countdown
      startActiveTimer({
        key: t.key, kind: 'rest', totalSeconds: REST_SECONDS, elapsed: 0,
        paused: false, logWork: false, sequenceIndex: t.sequenceIndex, totalSets: t.totalSets,
      });
      render();
    }
    return;
  }
  if (t.kind === 'rest') {
    if (STATE.setFlow) STATE.setFlow.setIndex += 1;
    render();
  }
}

function togglePauseActiveTimer() {
  if (!STATE.activeTimer) return;
  STATE.activeTimer.paused = !STATE.activeTimer.paused;
  render();
}

function startPhaseTimerFor(idx) {
  const dIdx = getActiveDayIndex();
  const seq = buildDaySequence(STATE.plan.week[dIdx]);
  const entry = seq[idx];
  if (!entry || entry.type === 'exercise') return;
  const key = sequenceItemKey(dIdx, entry);
  const seconds = parseDurationToSeconds(entry.item.duration);
  if (!seconds) return;
  startActiveTimer({
    key, kind: 'phase', totalSeconds: seconds, elapsed: 0,
    paused: false, logWork: true, sequenceIndex: idx,
  });
  render();
}

function startSetTimerFor(idx) {
  const dIdx = getActiveDayIndex();
  const seq = buildDaySequence(STATE.plan.week[dIdx]);
  const entry = seq[idx];
  if (!entry || entry.type !== 'exercise') return;
  const key = sequenceItemKey(dIdx, entry);
  const ex = entry.item;
  const totalSets = parseInt(ex.sets, 10) || 1;
  if (!STATE.setFlow || STATE.setFlow.key !== key) STATE.setFlow = { key, setIndex: 0 };
  const repsInfo = parseReps(ex.reps);
  startActiveTimer({
    key,
    kind: 'reps',
    mode: repsInfo.type === 'count' ? 'reps' : 'countdown',
    totalReps: repsInfo.type === 'count' ? repsInfo.value : null,
    totalSeconds: repsInfo.type === 'count' ? repsInfo.value * SECONDS_PER_REP : repsInfo.seconds,
    elapsed: 0, paused: false, logWork: true, sequenceIndex: idx, totalSets,
  });
  render();
}

function skipCurrentSet() {
  const t = STATE.activeTimer;
  if (!t || t.kind !== 'reps') return;
  const totalSets = t.totalSets;
  const seqIdx = t.sequenceIndex;
  stopActiveTimer();
  if (!STATE.setFlow || STATE.setFlow.setIndex >= totalSets - 1) {
    STATE.setFlow = null;
    advanceSequence(seqIdx);
  } else {
    STATE.setFlow.setIndex += 1; // skipping a set also skips its rest
    render();
  }
}

function skipRest() {
  const t = STATE.activeTimer;
  if (!t || t.kind !== 'rest') return;
  stopActiveTimer();
  if (STATE.setFlow) STATE.setFlow.setIndex += 1;
  render();
}

function skipSequenceItem(idx) {
  stopActiveTimer();
  STATE.setFlow = null;
  advanceSequence(idx);
}

function advanceSequence(index) {
  STATE.sequenceProgress[index] = true;
  writeStored(STORAGE_KEYS.sequenceProgress, JSON.stringify(STATE.sequenceProgress));
  render();
}

// ---------- Calories from logged active time ----------

function computeDayCalories() {
  let warmcoolSeconds = 0;
  let exerciseSeconds = 0;
  Object.entries(STATE.workLog).forEach(([key, sec]) => {
    if (key[0] === 'w' || key[0] === 'c') warmcoolSeconds += sec;
    else exerciseSeconds += sec;
  });
  const weightRaw = parseFloat(STATE.onboarding.weight);
  const hasWeight = !isNaN(weightRaw) && weightRaw > 0;
  const weight = hasWeight ? weightRaw : DEFAULT_WEIGHT_KG;
  // kcal = MET × kg × hours
  const kcal = MET_WARMCOOL * weight * (warmcoolSeconds / 3600) + MET_EXERCISE * weight * (exerciseSeconds / 3600);
  const activeSeconds = warmcoolSeconds + exerciseSeconds;
  return {
    kcal: Math.round(kcal),
    activeMinutes: Math.round(activeSeconds / 60),
    activeSeconds,
    usedDefaultWeight: !hasWeight,
  };
}

// Totals for the current week: archived day records plus whatever the
// in-progress day has logged so far. Used by the insights strip and review.
function computeWeekStats() {
  const total = STATE.plan && Array.isArray(STATE.plan.week) ? STATE.plan.week.length : 0;
  const completed = Object.keys(STATE.dayProgress).filter((k) => STATE.dayProgress[k]).length;
  let activeMinutes = 0;
  let kcal = 0;
  STATE.weekLog.forEach((d) => { activeMinutes += d.activeMinutes || 0; kcal += d.kcal || 0; });
  if (Object.keys(STATE.workLog).length) {
    const live = computeDayCalories();
    activeMinutes += live.activeMinutes;
    kcal += live.kcal;
  }
  return { completed, total, activeMinutes, kcal };
}

function bmiCategory(bmi) {
  if (bmi === null) return '';
  if (bmi < 18.5) return 'Underweight';
  if (bmi < 25) return 'Healthy range';
  if (bmi < 30) return 'Overweight';
  return 'Obese range';
}

function fireConfetti(big) {
  if (typeof confetti !== 'function') return;
  if (big) {
    confetti({ particleCount: 160, spread: 100, origin: { y: 0.6 } });
    setTimeout(() => { if (typeof confetti === 'function') confetti({ particleCount: 120, spread: 130, origin: { y: 0.4 } }); }, 250);
  } else {
    confetti({ particleCount: 50, spread: 70, origin: { y: 0.7 } });
  }
}

// Called by Mark Day Complete: snapshot the day's stats BEFORE resetting per-day state,
// so the next Home visit can show the "Yesterday: ..." preview.
function completeActiveDay() {
  const dIdx = getActiveDayIndex();
  const summary = computeDayCalories();
  STATE.lastDaySummary = { dayIndex: dIdx, kcal: summary.kcal, activeMinutes: summary.activeMinutes, previewDismissed: false };
  writeStored(STORAGE_KEYS.lastDaySummary, JSON.stringify(STATE.lastDaySummary));
  // Per-day record for the week: feeds the home insights strip and the
  // week-end review stats, and gets archived into history at week rollover.
  STATE.weekLog.push({ dayIndex: dIdx, kcal: summary.kcal, activeMinutes: summary.activeMinutes });
  writeStored(STORAGE_KEYS.weekLog, JSON.stringify(STATE.weekLog));
  STATE.dayProgress[dIdx] = true;
  writeStored(STORAGE_KEYS.dayProgress, JSON.stringify(STATE.dayProgress));
  resetDayScopedState();
  bumpStreakIfNeeded();
  STATE.screen = 'home';
  render();
}

function dismissDayPreview() {
  if (!STATE.lastDaySummary) return;
  STATE.lastDaySummary.previewDismissed = true;
  writeStored(STORAGE_KEYS.lastDaySummary, JSON.stringify(STATE.lastDaySummary));
}

async function fetchMealIdeas(mealType) {
  if (STATE.mealIdeas[mealType] || STATE.mealIdeasLoading[mealType]) return;
  STATE.mealIdeasLoading[mealType] = true;
  STATE.mealIdeasError[mealType] = null;
  render();
  try {
    const response = await fetch('/api/meal-ideas', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mealType, goal: STATE.onboarding.goal, dietPref: STATE.dietPref }),
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'empty meal response');
    STATE.mealIdeas[mealType] = { ideas: data.ideas || [], cravingSwaps: data.cravingSwaps || [] };
  } catch (err) {
    // API unavailable → serve the hardcoded Indian budget-friendly ideas
    // instead of an error; the UI renders them exactly like API results.
    console.log('[gymbuddy] meal-ideas API unavailable (' + err.message + ') — using built-in ' + mealType + ' ideas');
    STATE.mealIdeas[mealType] = dietCompliantMeals(deepCopy(FALLBACK_MEALS[mealType] || FALLBACK_MEALS.Snack), mealType, STATE.dietPref);
  } finally {
    STATE.mealIdeasLoading[mealType] = false;
    render();
  }
}

async function fetchRecipe(mealName) {
  if (STATE.recipes[mealName] || STATE.recipeLoading[mealName]) return;

function renderVideoControl(vKey, searchTerm, label) {
  const cached = STATE.videoCache[vKey];

  let btnLabel = label;
  if (loading) btnLabel = '⏳ Loading…';

async function toggleOrFetchVideo(vKey, searchTerm) {
  if (STATE.videoCache[vKey]) {
    STATE.videoVisible[vKey] = !STATE.videoVisible[vKey];
    render();

  if (STATE.videoLoading[vKey]) return;
  STATE.videoLoading[vKey] = true;
  STATE.videoError[vKey] = null;
  render();
  try {
    const response = await fetch('/api/get-video', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },

// ---------- Initial screen routing (runs once, after STATE is populated from storage) ----------
// Logged to the console so persistence failures can be debugged in the field:
// which keys survived the reload, which screen was chosen, and why.
(function routeInitialScreen() {
  const foundKeys = Object.entries(STORAGE_KEYS)
    .filter(([, storageKey]) => readStored(storageKey) !== null)
    .map(([shortName]) => shortName);
  // Origin matters: localStorage is per-origin, so opening a different deploy
  // URL (vercel preview vs production vs localhost) shows an empty app even
  // though nothing was lost. This log makes that diagnosis instant.
  console.log('[gymbuddy] load: origin=' + location.origin + ' · storage keys found →', foundKeys.length ? foundKeys.join(', ') : '(none)');
  console.log('[gymbuddy] load: name=' + JSON.stringify(STATE.name),
    '· plan=' + (STATE.plan ? 'schema v' + STATE.plan.schema_version + ' / ' + (Array.isArray(STATE.plan.week) ? STATE.plan.week.length + ' days' : 'no week array') : 'null'),
    '· planValid=' + (STATE.plan ? isPlanValid(STATE.plan) : 'n/a'),
    '· usingFallback=' + STATE.usingFallback,
    '· onboarding={exp:' + STATE.onboarding.experience_level + ', days:' + STATE.onboarding.days_available + ', goal:' + STATE.onboarding.goal + ', weight:' + STATE.onboarding.weight + ', height:' + STATE.onboarding.height + '}');

  if (STATE.name && STATE.plan && isPlanValid(STATE.plan)) {
    STATE.screen = 'home';
    console.log('[gymbuddy] load: screen=home (saved name + valid plan)');
  } else if (STATE.name && STATE.plan) {
    // Plan exists but fails isPlanValid (usually an old schema_version):
    // route to the friendly one-tap regenerate screen instead of full onboarding.
    STATE.screen = 'planRefresh';
    console.log('[gymbuddy] load: screen=planRefresh (saved name + plan, but plan failed isPlanValid — schema_version is', STATE.plan.schema_version, ', expected', PLAN_SCHEMA_VERSION + ')');
  } else if (STATE.name) {
    STATE.screen = 'experience';
    console.log('[gymbuddy] load: screen=experience (saved name, no saved plan — skipping name entry)');
  } else {
    STATE.screen = 'profile';
    console.log('[gymbuddy] load: screen=profile (no saved name found)');
  }
})();

function render() {
  const frame = document.getElementById('phoneFrame');
  // innerHTML replacement creates a fresh .screen element with scrollTop 0,
  // which made every mid-session tap (Start Set, View Instructions, …) jump
  // to the top. Capture and restore scroll — but only for same-screen
  // re-renders; actual navigation should still start at the top.
  const prevScreenEl = frame.querySelector ? frame.querySelector('.screen.active') : null;
  const prevScroll = prevScreenEl ? prevScreenEl.scrollTop : 0;
  const sameScreen = render._lastScreen === STATE.screen;
  if (STATE.screen === 'profile') frame.innerHTML = renderProfile();
  else if (STATE.screen === 'experience') frame.innerHTML = renderExperience();
  else if (STATE.screen === 'days') frame.innerHTML = renderDays();
  else if (STATE.screen === 'goal') frame.innerHTML = renderGoal();
  else if (STATE.screen === 'weight') frame.innerHTML = renderWeight();
  else if (STATE.screen === 'injuries') frame.innerHTML = renderInjuries();
  else if (STATE.screen === 'loading') frame.innerHTML = renderLoading();
  else if (STATE.screen === 'planRefresh') frame.innerHTML = renderPlanRefresh();
  else if (STATE.screen === 'home') frame.innerHTML = renderHome();
  else if (STATE.screen === 'profilePage') frame.innerHTML = renderProfilePage();
  else if (STATE.screen === 'session') frame.innerHTML = renderSession();
  else if (STATE.screen === 'summary') frame.innerHTML = renderSummary();
  attachListeners();
  if (sameScreen && prevScroll) {
    const nextScreenEl = frame.querySelector ? frame.querySelector('.screen.active') : null;
    if (nextScreenEl) nextScreenEl.scrollTop = prevScroll;
  }
  render._lastScreen = STATE.screen;
}

function isValidWeight(value) {
  const v = parseFloat(value);
  return !isNaN(v) && v >= 20 && v <= 300;
}

// Height is optional: blank is fine (BMI falls back to 165 cm), but a typed
// value must be plausible.
function isValidHeight(value) {
  if (value === '' || value === null || value === undefined) return true;
  const v = parseFloat(value);
  return !isNaN(v) && v >= 100 && v <= 250;
}

// BMI = kg / m². Profiles saved before the height field existed (or with the
// field left blank) default to 165 cm — never crash on missing height.
function computeBMI(onboarding) {
  const kg = parseFloat(onboarding && onboarding.weight);
  if (isNaN(kg) || kg <= 0) return null;
  const cm = parseFloat(onboarding && onboarding.height) || 165;
  const m = cm / 100;
  return Math.round((kg / (m * m)) * 10) / 10;
}

// Gentle guardrail, never a gate: suggest a better-matched goal when BMI and
// goal point in opposite directions. Returns null when no suggestion applies.
function bmiGoalSuggestion() {
  const bmi = computeBMI(STATE.onboarding);
  if (bmi === null) return null;
  const goal = STATE.onboarding.goal;
  if (bmi < 18.5 && goal === 'lose_weight') return { bmi, suggested: 'build_muscle', label: 'Build muscle', pitch: 'building strength' };
  if (bmi > 30 && goal === 'build_muscle') return { bmi, suggested: 'lose_weight', label: 'Lose weight', pitch: 'steady fat loss' };
  return null;
}

function renderUpNext(day, dIdx) {
  const sequence = buildDaySequence(day);
  let cur = 0;
  while (cur < sequence.length && STATE.sequenceProgress[cur]) cur++;
  const upcoming = sequence.slice(cur, cur + 3);
  if (!upcoming.length) return '';
  const badge = (type) => (type === 'warmup' ? '🔥' : type === 'cooldown' ? '🧘' : '💪');
  const meta = (entry) => entry.type === 'exercise'
    ? `${parseInt(entry.item.sets, 10) || 1} × ${escapeHtml(entry.item.reps)}`
    : escapeHtml(entry.item.duration || '');
  return `
    <div class="upnext-card">
      <div class="phase-label" style="margin-bottom:4px;">Up next</div>
      ${upcoming.map((e) => `
      <div class="upnext-row">
        <span class="upnext-name">${badge(e.type)} ${escapeHtml(e.item.name)}</span>
        <span class="upnext-meta">${meta(e)}</span>
      </div>`).join('')}
    </div>`;
}

      <div class="meal-chips">${goals.map((g) => `<button class="meal-chip ${rv.goal === g.value ? 'selected' : ''}" data-review-goal="${g.value}">${g.label}</button>`).join('')}</div>
      <button class="btn-primary" id="generateNextWeekBtn" style="margin-top:20px;" ${isValidWeight(rv.weight) ? '' : 'disabled'}>Generate Week ${STATE.weekNumber + 1}</button>
    </div>`;
}

// Roll the program forward one week: archive the finished week, bump the
// counter, and install the new plan (API or fallback) via the normal path.
function adoptNextWeek(week, { fallback }) {
  const stats = computeWeekStats();
  STATE.history.push({
    week: STATE.weekNumber,
    completedDays: stats.completed,
    totalDays: stats.total,
    activeMinutes: stats.activeMinutes,
    kcal: stats.kcal,
    feedback: STATE.weekReview ? STATE.weekReview.feedback : null,
    weekLog: STATE.weekLog,
    endedAt: new Date().toISOString().slice(0, 10),
  });
  writeStored(STORAGE_KEYS.history, JSON.stringify(STATE.history));
  STATE.weekNumber += 1;
  writeStored(STORAGE_KEYS.weekNumber, String(STATE.weekNumber));
  STATE.weekLog = [];
  writeStored(STORAGE_KEYS.weekLog, JSON.stringify(STATE.weekLog));
  STATE.weekReview = null;
  adoptPlan(week, { fallback }); // resets dayProgress/sequenceProgress/lastDaySummary
}

async function generateNextWeek() {
  const rv = STATE.weekReview || {};
  const stats = computeWeekStats();
  const previousWeight = STATE.onboarding.weight;

  // Commit the check-in answers to the profile before generating.
  if (isValidWeight(rv.weight)) STATE.onboarding.weight = rv.weight;
  if (rv.goal) STATE.onboarding.goal = rv.goal;
  writeStored(STORAGE_KEYS.onboarding, JSON.stringify(STATE.onboarding));

  const previousWeekSummary = {
    completionRate: stats.total ? Math.round((stats.completed / stats.total) * 100) : 0,
    feedback: rv.feedback || 'just_right',
    feedbackText: rv.feedbackText || '',
    weightChange: { from: previousWeight, to: STATE.onboarding.weight },
    newGoal: STATE.onboarding.goal,
  };

  STATE.screen = 'loading';
  render();
  startLoadingFacts();

  try {
    const response = await fetch('/api/next-week', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ onboarding: STATE.onboarding, previousWeekSummary, weekNumber: STATE.weekNumber + 1 }),
    });
    const data = await response.json();
    if (!response.ok || !Array.isArray(data.week) || data.week.length === 0) {
      throw new Error(data.error || 'empty plan response');
    }
    adoptNextWeek(data.week, { fallback: false });
    stopLoadingFacts();
    STATE.screen = 'home';
    render();
  } catch (err) {
    // Same promise as week 1: adapt with what we have, never an error screen.
    stopLoadingFacts();
    const goalKey = FALLBACK_PLANS[STATE.onboarding.goal] ? STATE.onboarding.goal : 'general_fitness';
    console.log('[gymbuddy] next-week API unavailable (' + err.message + ') — using starter plan:', goalKey);
    adoptNextWeek(deepCopy(FALLBACK_PLANS[goalKey].week), { fallback: true });
    STATE.screen = 'home';
    render();
    showToast('Using a starter plan for this week — a personalized one will sync when connection improves');
  }
}

  if (type === 'warmup') return '🔥 Warm-up';
  if (type === 'exercise') return '💪 Main Workout';

function renderSession() {
  if (!STATE.plan) return renderGoal();
  if (!isPlanValid(STATE.plan)) return renderPlanRefresh();
  const dIdx = getActiveDayIndex();
  const day = STATE.plan.week[dIdx];
  if (!day) { STATE.screen = 'home'; return renderHome(); }

  const sequence = buildDaySequence(day);
  const total = sequence.length;
  let currentIndex = 0;
  while (currentIndex < total && STATE.sequenceProgress[currentIndex]) currentIndex++;

  // Keep setFlow in sync with whichever exercise is current
  if (currentIndex < total) {
    const currentEntry = sequence[currentIndex];
    if (currentEntry.type === 'exercise') {
      const currentKey = sequenceItemKey(dIdx, currentEntry);
      if (!STATE.setFlow || STATE.setFlow.key !== currentKey) STATE.setFlow = { key: currentKey, setIndex: 0 };
    } else if (STATE.setFlow) {
      STATE.setFlow = null;
    }
  }

  let prevType = null;
  const itemsHtml = sequence.map((entry, idx) => {
    let header = '';
    if (entry.type !== prevType) {
      prevType = entry.type;
      header = `<div class="session-phase-header">${phaseHeaderLabel(entry.type)}</div>`;
    }
    const status = idx < currentIndex ? 'completed' : idx === currentIndex ? 'current' : 'locked';
    return header + renderSessionItem(entry, idx, status, dIdx);
  }).join('');

  const allDone = currentIndex >= total;
  const pct = total ? Math.min(currentIndex, total) / total : 0;

  return `
    <div class="screen active">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px;">
        <div>
          <div class="eyebrow">Day ${dIdx + 1} of ${STATE.plan.week.length}</div>
          <h1 style="font-size:22px;">${escapeHtml(day.focus)}</h1>
        </div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="transform:scaleX(${pct.toFixed(3)});"></div></div>
      <div class="session-progress-label">${Math.min(currentIndex, total)} of ${total} complete</div>
      <div>
        ${itemsHtml}
      </div>
      ${allDone ? `<button class="btn-primary" id="finishDayBtn" style="margin-top:18px;">Finish Day</button>` : ''}
      <button class="btn-ghost" id="backToHomeBtn">Back to Home</button>
    </div>`;
}

      </div>
      <div class="progress-card">
        <div class="progress-card-value" style="margin-top:2px;">~${cal.kcal} kcal · ${cal.activeMinutes} active min <button class="info-btn" id="calInfoBtn" aria-label="How this is estimated">i</button></div>
        ${STATE.calInfoOpen ? `<div class="progress-card-sub">Estimated from your active minutes${weightNote}. A rough estimate, not precise tracking.</div>` : ''}
      </div>
      <div class="phase-label" style="margin-top:18px;">What's your next meal?</div>
      <div class="meal-chips">${mealChips}</div>
      ${mealSectionHtml}
      ${cravingsHtml}
      <button class="btn-primary" id="markDayCompleteBtn" style="margin-top:24px;">Mark Day Complete &amp; Continue</button>
    </div>`;
}

// ---------- Listeners ----------

function resetDayScopedState() {
  stopActiveTimer();
  STATE.sequenceProgress = {};
  STATE.workLog = {};
  STATE.setFlow = null;
  STATE.swaps = {};
  STATE.nextMeal = null;
  STATE.expanded = {};
  STATE.videoCache = {};
  STATE.videoLoading = {};
  STATE.videoError = {};
  STATE.videoVisible = {};
  STATE.mealIdeas = {};
  STATE.mealIdeasLoading = {};
  STATE.mealIdeasError = {};
  STATE.recipes = {};
  STATE.recipeLoading = {};
  STATE.recipeError = {};
  STATE.mealExpand = {};
  writeStored(STORAGE_KEYS.sequenceProgress, JSON.stringify(STATE.sequenceProgress));
  persistWorkLog();
}

function attachListeners() {
  const profileBtn = document.getElementById('profileContinueBtn');
  if (profileBtn) profileBtn.addEventListener('click', () => {
    const val = document.getElementById('nameInput').value.trim();
    STATE.name = val || 'there';
    writeStored(STORAGE_KEYS.name, STATE.name);
    STATE.screen = 'experience';
    render();
  });

  document.querySelectorAll('.option-chip').forEach((chip) => {
    chip.addEventListener('click', () => {
      const stack = chip.closest('.option-stack');
      const field = stack.dataset.field;
      stack.querySelectorAll('.option-chip').forEach((c) => c.classList.remove('selected'));
      chip.classList.add('selected');
      STATE.onboarding[field] = chip.dataset.value;
      writeStored(STORAGE_KEYS.onboarding, JSON.stringify(STATE.onboarding));
      render();
    });
  });

  const continueBtn = document.getElementById('continueBtn');
  if (continueBtn) continueBtn.addEventListener('click', () => {
    if (STATE.screen === 'experience') STATE.screen = 'days';
    else if (STATE.screen === 'days') STATE.screen = 'goal';
    else if (STATE.screen === 'goal') STATE.screen = 'weight';
    else if (STATE.screen === 'weight') {
      // First moment both goal and BMI are known: surface the guardrail card
      // once. Both of its buttons proceed — it informs, never blocks.
      const suggestion = STATE.bmiPromptResolved ? null : bmiGoalSuggestion();
      if (suggestion) {
        STATE.bmiSuggest = suggestion;
        render();
        return;
      }
      STATE.screen = 'injuries';
    }
    render();
  });

  document.querySelectorAll('[data-bmi-switch]').forEach((btn) => {
    btn.addEventListener('click', () => {
      STATE.onboarding.goal = STATE.bmiSuggest.suggested;
      writeStored(STORAGE_KEYS.onboarding, JSON.stringify(STATE.onboarding));
      STATE.bmiSuggest = null;
      STATE.bmiPromptResolved = true;
      STATE.screen = 'injuries';
      render();
    });
  });

  document.querySelectorAll('[data-bmi-keep]').forEach((btn) => {
    btn.addEventListener('click', () => {
      STATE.bmiSuggest = null;
      STATE.bmiPromptResolved = true;
      STATE.screen = 'injuries';
      render();
    });
  });

  const weightInput = document.getElementById('weightInput');
  const heightInput = document.getElementById('heightInput');
  const syncBodyContinue = () => {
    const btn = document.getElementById('continueBtn');
    if (btn) btn.disabled = !isValidWeight(weightInput ? weightInput.value : STATE.onboarding.weight)
      || !isValidHeight(heightInput ? heightInput.value : STATE.onboarding.height);
  };
  if (weightInput) weightInput.addEventListener('input', () => {
    STATE.onboarding.weight = weightInput.value;
    writeStored(STORAGE_KEYS.onboarding, JSON.stringify(STATE.onboarding));
    syncBodyContinue();
  });
  if (heightInput) heightInput.addEventListener('input', () => {
    STATE.onboarding.height = heightInput.value;
    writeStored(STORAGE_KEYS.onboarding, JSON.stringify(STATE.onboarding));
    syncBodyContinue();
  });

  const injuriesInput = document.getElementById('injuriesInput');
  if (injuriesInput) injuriesInput.addEventListener('input', () => {
    STATE.onboarding.injuries = injuriesInput.value;
    writeStored(STORAGE_KEYS.onboarding, JSON.stringify(STATE.onboarding));
  });

  const generateBtn = document.getElementById('generatePlanBtn');
  if (generateBtn) generateBtn.addEventListener('click', guardTap(generatePlan));

  const skipInjuriesBtn = document.getElementById('skipInjuriesBtn');
  if (skipInjuriesBtn) skipInjuriesBtn.addEventListener('click', guardTap(() => {
    STATE.onboarding.injuries = '';
    writeStored(STORAGE_KEYS.onboarding, JSON.stringify(STATE.onboarding));
    generatePlan();
  }));

  const regenerateBtn = document.getElementById('regeneratePlanBtn');
  if (regenerateBtn) regenerateBtn.addEventListener('click', guardTap(() => {
    const o = STATE.onboarding;
    if (o.experience_level && o.days_available && o.goal) {
      generatePlan();
    } else {
      STATE.screen = 'experience';
      render();
    }
  }));

  const startDayBtn = document.getElementById('startDayBtn');
  if (startDayBtn) startDayBtn.addEventListener('click', guardTap(() => {
    STATE.screen = 'session';
    render();
  }));

  const previewStartBtn = document.getElementById('previewStartBtn');
  if (previewStartBtn) previewStartBtn.addEventListener('click', guardTap(() => {
    dismissDayPreview();
    STATE.screen = 'session';
    render();
  }));

  const previewBackdrop = document.getElementById('previewBackdrop');
  if (previewBackdrop) previewBackdrop.addEventListener('click', (e) => {
    if (e.target === previewBackdrop) {
      dismissDayPreview();
      render();
    }
  });

  const backToHomeBtn = document.getElementById('backToHomeBtn');
  if (backToHomeBtn) backToHomeBtn.addEventListener('click', guardTap(() => {
    stopActiveTimer();
    STATE.screen = 'home';
    render();
  }));

  const finishDayBtn = document.getElementById('finishDayBtn');
  if (finishDayBtn) finishDayBtn.addEventListener('click', guardTap(() => {
    STATE.screen = 'summary';
    render();
    fireConfetti(true);
  }));

  const markDayCompleteBtn = document.getElementById('markDayCompleteBtn');
  if (markDayCompleteBtn) markDayCompleteBtn.addEventListener('click', guardTap(completeActiveDay));

  document.querySelectorAll('[data-expand-key]').forEach((el) => {
    el.addEventListener('click', () => {
      const key = el.dataset.expandKey;
      STATE.expanded[key] = !STATE.expanded[key];
      render();
    });
  });

  document.querySelectorAll('[data-media-mode]').forEach((btn) => {
    btn.addEventListener('click', () => {
      if (btn.dataset.mediaMode === STATE.mediaMode) return;
      STATE.mediaMode = btn.dataset.mediaMode;
      render();
    });
  });

  document.querySelectorAll('button[data-video-key]').forEach((btn) => {
    btn.addEventListener('click', guardTap((e) => {
      e.stopPropagation();
      toggleOrFetchVideo(btn.dataset.videoKey, btn.dataset.searchTerm);
    }));
  });

  document.querySelectorAll('[data-phase-start]').forEach((btn) => {
    btn.addEventListener('click', guardTap(() => startPhaseTimerFor(parseInt(btn.dataset.phaseStart, 10))));
  });

  document.querySelectorAll('[data-start-set]').forEach((btn) => {
    btn.addEventListener('click', guardTap(() => startSetTimerFor(parseInt(btn.dataset.startSet, 10))));
  });

  document.querySelectorAll('[data-pause-toggle]').forEach((btn) => {
    btn.addEventListener('click', () => togglePauseActiveTimer());
  });

  document.querySelectorAll('[data-skip-set]').forEach((btn) => {
    btn.addEventListener('click', guardTap(() => skipCurrentSet()));
  });

  document.querySelectorAll('[data-skip-rest]').forEach((btn) => {
    btn.addEventListener('click', guardTap(() => skipRest()));
  });

  document.querySelectorAll('[data-skip-exercise]').forEach((btn) => {
    btn.addEventListener('click', guardTap(() => skipSequenceItem(parseInt(btn.dataset.skipExercise, 10))));
  });

  document.querySelectorAll('.btn-skip[data-skip-index]').forEach((btn) => {
    btn.addEventListener('click', guardTap(() => skipSequenceItem(parseInt(btn.dataset.skipIndex, 10))));
  });

  document.querySelectorAll('[data-swap-key]').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = btn.dataset.swapKey;
      STATE.swaps[key] = !STATE.swaps[key];
      render();
    });
  });

  document.querySelectorAll('.meal-chip[data-meal]').forEach((btn) => {
    btn.addEventListener('click', guardTap(() => {
      STATE.nextMeal = btn.dataset.meal;
      render();
      // First-ever meal tap: ask dietary preference before fetching —
      // the diet chip that gets tapped will trigger the fetch instead.
      if (STATE.dietPref !== null) fetchMealIdeas(btn.dataset.meal);
    }));
  });

  // Diet preference chips (summary one-time prompt + profile page).
  document.querySelectorAll('[data-diet-value]').forEach((btn) => {
    btn.addEventListener('click', () => {
      STATE.dietPref = btn.dataset.dietValue;
      writeStored(STORAGE_KEYS.dietPref, STATE.dietPref);
      render();
      if (STATE.screen === 'summary' && STATE.nextMeal && !STATE.mealIdeas[STATE.nextMeal]) {
        fetchMealIdeas(STATE.nextMeal);
      }
    });
  });

  // ---- Profile page ----
  const profileOpenBtn = document.getElementById('profileBtn');
  if (profileOpenBtn) profileOpenBtn.addEventListener('click', () => { STATE.screen = 'profilePage'; render(); });

  const profileBackBtn = document.getElementById('profileBackBtn');
  if (profileBackBtn) profileBackBtn.addEventListener('click', () => { STATE.screen = 'home'; render(); });

  const profileNameInput = document.getElementById('profileNameInput');
  if (profileNameInput) profileNameInput.addEventListener('input', () => {
    STATE.name = profileNameInput.value.trim() || 'there';
    writeStored(STORAGE_KEYS.name, STATE.name);
  });

  // Weight/height edits persist on every keystroke and recompute the BMI row
  // in place (no full render, so the input keeps focus).
  const syncProfileBmi = () => {
    const el = document.getElementById('profileBmiValue');
    if (!el) return;
    const bmi = computeBMI(STATE.onboarding);
    el.textContent = bmi === null ? '—' : bmi + ' · ' + bmiCategory(bmi);
  };
  const profileWeightInput = document.getElementById('profileWeightInput');
  if (profileWeightInput) profileWeightInput.addEventListener('input', () => {
    if (profileWeightInput.value !== '' && !isValidWeight(profileWeightInput.value)) return;
    STATE.onboarding.weight = profileWeightInput.value;
    writeStored(STORAGE_KEYS.onboarding, JSON.stringify(STATE.onboarding));
    syncProfileBmi();
  });
  const profileHeightInput = document.getElementById('profileHeightInput');
  if (profileHeightInput) profileHeightInput.addEventListener('input', () => {
    if (!isValidHeight(profileHeightInput.value)) return;
    STATE.onboarding.height = profileHeightInput.value;
    writeStored(STORAGE_KEYS.onboarding, JSON.stringify(STATE.onboarding));
    syncProfileBmi();
  });

  const profileInjuriesInput = document.getElementById('profileInjuriesInput');
  if (profileInjuriesInput) profileInjuriesInput.addEventListener('input', () => {
    STATE.onboarding.injuries = profileInjuriesInput.value;
    writeStored(STORAGE_KEYS.onboarding, JSON.stringify(STATE.onboarding));
  });

  document.querySelectorAll('[data-profile-goal]').forEach((btn) => {
    btn.addEventListener('click', () => {
      STATE.onboarding.goal = btn.dataset.profileGoal;
      writeStored(STORAGE_KEYS.onboarding, JSON.stringify(STATE.onboarding));
      render();
    });
  });

  // ---- Week-end review ----
  const reviewWeightInput = document.getElementById('reviewWeightInput');
  if (reviewWeightInput) reviewWeightInput.addEventListener('input', () => {
    STATE.weekReview.weight = reviewWeightInput.value;
    const btn = document.getElementById('generateNextWeekBtn');
    if (btn) btn.disabled = !isValidWeight(reviewWeightInput.value);
  });

  const reviewTextInput = document.getElementById('reviewTextInput');
  if (reviewTextInput) reviewTextInput.addEventListener('input', () => {
    STATE.weekReview.feedbackText = reviewTextInput.value;
  });

  document.querySelectorAll('[data-review-feel]').forEach((btn) => {
    btn.addEventListener('click', () => {
      STATE.weekReview.feedback = btn.dataset.reviewFeel;
      render();
    });
  });

  document.querySelectorAll('[data-review-goal]').forEach((btn) => {
    btn.addEventListener('click', () => {
      STATE.weekReview.goal = btn.dataset.reviewGoal;
      render();
    });
  });

  const generateNextWeekBtn = document.getElementById('generateNextWeekBtn');
  if (generateNextWeekBtn) generateNextWeekBtn.addEventListener('click', guardTap(generateNextWeek));

  document.querySelectorAll('[data-recipe-for]').forEach((btn) => {
    btn.addEventListener('click', guardTap(() => toggleMealExpand(btn.dataset.recipeFor, 'recipe')));
  });

  document.querySelectorAll('[data-ingredients-for]').forEach((btn) => {
    btn.addEventListener('click', guardTap(() => toggleMealExpand(btn.dataset.ingredientsFor, 'ingredients')));
  });

  document.querySelectorAll('[data-order-instamart]').forEach((btn) => {
    btn.addEventListener('click', guardTap(openInstamart));
  });

  const calInfoBtn = document.getElementById('calInfoBtn');
  if (calInfoBtn) calInfoBtn.addEventListener('click', () => {
    STATE.calInfoOpen = !STATE.calInfoOpen;
    render();
  });

  document.querySelectorAll('[data-copy-list]').forEach((btn) => {
    btn.addEventListener('click', guardTap(() => copyIngredientList(btn.dataset.copyList)));
  });

  const restartBtn = document.getElementById('restartBtn');
  if (restartBtn) restartBtn.addEventListener('click', () => {
    if (!confirm('This clears your current plan and progress. Continue?')) return;
    resetDayScopedState();
    removeStored(STORAGE_KEYS.plan);
    removeStored(STORAGE_KEYS.dayProgress);
    removeStored(STORAGE_KEYS.sequenceProgress);
    removeStored(STORAGE_KEYS.workLog);
    removeStored(STORAGE_KEYS.onboarding);
    removeStored(STORAGE_KEYS.lastDaySummary);
    removeStored(STORAGE_KEYS.weekNumber);
    removeStored(STORAGE_KEYS.weekLog);
    STATE.plan = null;
    STATE.dayProgress = {};
    STATE.lastDaySummary = null;
    STATE.error = null;
    STATE.onboarding = { experience_level: null, days_available: null, goal: null, injuries: '', weight: null, height: null };
    STATE.bmiSuggest = null;
    STATE.bmiPromptResolved = false;
    // Fresh program: back to week 1 with an empty week log. History and the
    // dietary preference are user-level and survive a restart.
    STATE.weekNumber = 1;
    STATE.weekLog = [];
    STATE.weekReview = null;
    STATE.screen = 'experience';
    render();
  });
}

// Gentle informational banner. Attached to <body>, not the phone frame, so
// re-renders can't wipe it; auto-dismisses after 4s and never blocks taps.
function showToast(message) {
  const existing = document.getElementById('toastBanner');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'toastBanner';
  el.className = 'toast-banner';
  el.textContent = message;
  document.body.appendChild(el);
  // setTimeout, not requestAnimationFrame: rAF is throttled in backgrounded
  // tabs and the toast would silently never fade in.
  setTimeout(() => el.classList.add('show'), 20);
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 350);
  }, 4000);
}

// Install a week as the active plan (API or fallback) and persist everything
// synchronously. The usingFallback flag survives reloads so the boot logic
// knows to retry the API in the background.
function adoptPlan(week, { fallback }) {
  STATE.plan = { schema_version: PLAN_SCHEMA_VERSION, week };
  STATE.dayProgress = {};
  STATE.lastDaySummary = null;
  writeStored(STORAGE_KEYS.plan, JSON.stringify(STATE.plan));
  writeStored(STORAGE_KEYS.dayProgress, JSON.stringify(STATE.dayProgress));
  removeStored(STORAGE_KEYS.lastDaySummary);
  STATE.usingFallback = !!fallback;
  if (fallback) writeStored(STORAGE_KEYS.usingFallback, '1');
  else removeStored(STORAGE_KEYS.usingFallback);
  resetDayScopedState();
}

async function generatePlan() {
  STATE.screen = 'loading';
  STATE.error = null;
  render();
  startLoadingFacts();

  try {
    const response = await fetch('/api/generate-plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(STATE.onboarding),
    });
    const data = await response.json();
    if (!response.ok || !Array.isArray(data.week) || data.week.length === 0) {
      throw new Error(data.error || 'empty plan response');
    }
    adoptPlan(data.week, { fallback: false });
    stopLoadingFacts();
    STATE.screen = 'home';
    render();
  } catch (err) {
    // Any failure (timeout, rate limit, 5xx, network) falls back to a
    // pre-built starter plan matching the user's goal — never an error screen.
    stopLoadingFacts();
    const goalKey = FALLBACK_PLANS[STATE.onboarding.goal] ? STATE.onboarding.goal : 'general_fitness';
    console.log('[gymbuddy] plan API unavailable (' + err.message + ') — using starter plan:', goalKey);
    adoptPlan(deepCopy(FALLBACK_PLANS[goalKey].week), { fallback: true });
    STATE.screen = 'home';
    render();
    showToast('Using a starter plan — personalized plan will sync when connection improves');
  }
}

// Runs once per app open when the last plan came from the fallback: quietly
// asks the API again and swaps in the personalized plan, but only if the user
// hasn't logged any progress yet. Failures are silent by design.
// Tiny non-blocking indicator while the personalized plan syncs in the
// background. Lives outside the render cycle, like the toast.
function showSyncPill() {
  if (document.getElementById('syncPill')) return;
  const el = document.createElement('div');
  el.id = 'syncPill';
  el.className = 'sync-pill';
  el.textContent = '✨ Personalizing…';
  document.body.appendChild(el);
}
function hideSyncPill() {
  const el = document.getElementById('syncPill');
  if (el) el.remove();
}

async function silentPlanRefresh() {
  if (silentPlanRefresh._inFlight) return;
  const ob = STATE.onboarding || {};
  if (!ob.experience_level || !ob.days_available || !ob.goal) return;
  // Week 2+ fallbacks stay put: regenerating via /api/generate-plan would
  // produce a week-1 plan and silently discard the adaptive context.
  if (STATE.weekNumber > 1) return;
  const untouched = () =>
    Object.keys(STATE.sequenceProgress).length === 0 && Object.keys(STATE.dayProgress).length === 0;
  if (!untouched()) return;
  silentPlanRefresh._inFlight = true;
  showSyncPill();
  console.log('[gymbuddy] silent retry: fetching personalized plan in background');
  try {
    const response = await fetch('/api/generate-plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(STATE.onboarding),
    });
    const data = await response.json();
    if (!response.ok || !Array.isArray(data.week) || data.week.length === 0) {
      console.log('[gymbuddy] silent retry: API still unavailable — keeping starter plan');
      return;
    }
    // Re-check after the await: the user may have started exercising meanwhile.
    if (!untouched()) {
      console.log('[gymbuddy] silent retry: user already started — keeping starter plan');
      return;
    }
    adoptPlan(data.week, { fallback: false });
    console.log('[gymbuddy] silent retry: personalized plan synced');
    render();
    showToast('Your personalized plan is ready ✨');
  } catch (err) {
    console.log('[gymbuddy] silent retry skipped:', err.message);
  } finally {
    hideSyncPill();
    silentPlanRefresh._inFlight = false;
  }
}

function bumpStreakIfNeeded() {
  const today = new Date().toDateString();
  const lastActive = readStored(STORAGE_KEYS.lastActiveDay);
  if (lastActive !== today) {
    STATE.streak += 1;
    writeStored(STORAGE_KEYS.lastActiveDay, today);
    writeStored(STORAGE_KEYS.streak, String(STATE.streak));
  }
}

render();

// If the current plan is a starter fallback, quietly try to upgrade it to a
// personalized one in the background — once per app open, never interrupting.
if (STATE.usingFallback && STATE.plan) silentPlanRefresh();

// …and again whenever the app comes back to the foreground, so a starter
// plan upgrades as soon as connectivity returns (same no-progress guard).
if (typeof document.addEventListener === 'function') {
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && STATE.usingFallback && STATE.plan) silentPlanRefresh();
  });
}
</script>
